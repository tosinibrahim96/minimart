services:
  api:
    build:
      context: .
      target: dev          # build the dev image (with tooling + reload)
    container_name: minimart-api
    ports:
      - "8000:8000"        # host:container
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/minimart
    volumes:
      - .:/app             # mount the whole project: app/ AND tests/
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: minimart-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=minimart
    volumes:
      - minimart-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
volumes:
  minimart-db-data: